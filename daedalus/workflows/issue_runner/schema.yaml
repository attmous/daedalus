$schema: http://json-schema.org/draft-07/schema#
title: issue-runner workflow config
type: object
required:
  - workflow
  - schema-version
  - instance
  - repository
  - tracker
  - workspace
  - runtimes
  - agent
  - storage
properties:
  workflow:
    const: issue-runner
  schema-version:
    type: integer
    enum: [1]

  instance:
    type: object
    required: [name, engine-owner]
    properties:
      name:
        type: string
      engine-owner:
        type: string
        enum: [hermes, openclaw]

  repository:
    type: object
    required: [local-path, github-slug]
    properties:
      local-path: {type: string}
      github-slug: {type: string}

  tracker:
    type: object
    required: [kind, path]
    properties:
      kind:
        type: string
        enum: [local-json]
      path: {type: string}
      active-states:
        type: array
        items: {type: string}
      terminal-states:
        type: array
        items: {type: string}
      required-labels:
        type: array
        items: {type: string}
      exclude-labels:
        type: array
        items: {type: string}

  polling:
    type: object
    properties:
      interval-seconds:
        type: integer
        minimum: 1

  workspace:
    type: object
    required: [root]
    properties:
      root: {type: string}

  hooks:
    type: object
    properties:
      after-create: {type: string}
      before-run: {type: string}
      after-run: {type: string}
      before-remove: {type: string}
      timeout-seconds:
        type: integer
        minimum: 1

  runtimes:
    type: object
    minProperties: 1
    additionalProperties:
      oneOf:
        - $ref: "#/definitions/acpx-codex-runtime"
        - $ref: "#/definitions/claude-cli-runtime"
        - $ref: "#/definitions/hermes-agent-runtime"

  agent:
    type: object
    required: [name, model, runtime]
    properties:
      name: {type: string}
      model: {type: string}
      runtime: {type: string}
      command:
        type: array
        minItems: 1
        items: {type: string}
      max-concurrent-issues:
        type: integer
        minimum: 1

  retry:
    type: object
    properties:
      continuation-delay-seconds:
        type: integer
        minimum: 0
      initial-backoff-seconds:
        type: integer
        minimum: 0
      max-backoff-seconds:
        type: integer
        minimum: 0
      max-attempts:
        type: integer
        minimum: 1

  stall:
    type: object
    properties:
      timeout_ms:
        type: integer
        minimum: 0

  server:
    type: object
    properties:
      port:
        type: integer
        minimum: 0
        maximum: 65535
      bind:
        type: string

  storage:
    type: object
    required: [status, health, audit-log]
    properties:
      status: {type: string}
      health: {type: string}
      audit-log: {type: string}

  workflow-policy:
    type: string

definitions:
  acpx-codex-runtime:
    type: object
    required: [kind]
    properties:
      kind:
        const: acpx-codex
      session-idle-freshness-seconds: {type: integer}
      session-idle-grace-seconds: {type: integer}
      session-nudge-cooldown-seconds: {type: integer}
      command:
        type: array
        minItems: 1
        items: {type: string}
  claude-cli-runtime:
    type: object
    required: [kind]
    properties:
      kind:
        const: claude-cli
      max-turns-per-invocation: {type: integer}
      timeout-seconds: {type: integer}
      command:
        type: array
        minItems: 1
        items: {type: string}
  hermes-agent-runtime:
    type: object
    required: [kind]
    properties:
      kind:
        const: hermes-agent
      command:
        type: array
        minItems: 1
        items: {type: string}

